<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoMatRadar - 汽车材料技术情报系统</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Material Icons -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --color-primary: #2563eb;
            --color-secondary: #7c3aed;
            --color-accent: #f59e0b;
            --color-success: #10b981;
            --color-text-dark: #1f2937;
            --color-text-light: #6b7280;
            --color-bg-light: #f9fafb;
        }

        [data-theme="dark"] {
            --color-primary: #60a5fa;
            --color-secondary: #a78bfa;
            --color-accent: #fbbf24;
            --color-success: #34d399;
            --color-text-dark: #f9fafb;
            --color-text-light: #d1d5db;
            --color-bg-light: #1f2937;
        }

        * {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
        }

        body {
            background: var(--color-bg-light);
            color: var(--color-text-dark);
        }

        [data-theme="dark"] body {
            background: #111827;
        }

        /* Hero Section */
        .hero-section {
            background: linear-gradient(135deg, var(--color-primary) 0%, var(--color-secondary) 100%);
            position: relative;
            overflow: hidden;
        }

        .hero-section::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.05'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
        }

        .hero-title {
            font-size: 1.875rem;
            line-height: 1.2;
        }

        .hero-title .brand-name {
            font-size: 1.875rem;
        }

        .hero-title .slogan {
            font-size: 1.25rem;
            font-weight: 500;
        }

        @media (min-width: 768px) {
            .hero-title .brand-name {
                font-size: 3rem;
            }
            .hero-title .slogan {
                font-size: 1.875rem;
            }
        }

        .hero-title .divider {
            display: inline-block;
            margin: 0 0.5rem;
        }

        @media (max-width: 640px) {
            .hero-title .brand-name {
                font-size: 1.5rem;
            }
            .hero-title .slogan {
                font-size: 1rem;
            }
            .hero-title .divider {
                display: block;
                margin: 0.25rem 0;
                opacity: 0;
                height: 0;
            }
        }

        /* Search Container */
        .search-container {
            max-width: 700px;
            margin: 0 auto;
        }

        [data-theme="dark"] input[type="text"] {
            background: #374151;
            border-color: #4b5563;
            color: #f9fafb;
        }

        [data-theme="dark"] input[type="text"]::placeholder {
            color: #9ca3af;
        }

        /* Category Pills */
        .category-pill {
            display: inline-flex;
            align-items: center;
            padding: 10px 20px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s ease;
            cursor: pointer;
            border: 2px solid #e5e7eb;
            background: white;
            color: var(--color-text-dark);
        }

        .category-pill:hover {
            border-color: var(--color-primary);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.15);
        }

        .category-pill.active {
            background: linear-gradient(135deg, var(--color-primary), var(--color-secondary));
            color: white;
            border-color: transparent;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
        }

        [data-theme="dark"] .category-pill {
            background: #374151;
            border-color: #4b5563;
            color: #f9fafb;
        }

        /* Navigation Bar Dark Mode */
        [data-theme="dark"] .sticky {
            background: rgba(31, 41, 55, 0.9) !important;
            backdrop-filter: blur(12px);
            border-color: rgba(75, 85, 99, 0.3) !important;
        }

        /* Article Card */
        .article-card {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            transition: all 0.3s ease;
            border: 1px solid #e5e7eb;
            display: flex;
            gap: 0;
        }

        .article-card:hover {
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            transform: translateY(-4px);
        }

        [data-theme="dark"] .article-card {
            background: #1f2937;
            border-color: #374151;
        }

        .article-accent {
            width: 6px;
            background: linear-gradient(180deg, var(--color-primary), var(--color-secondary));
            flex-shrink: 0;
        }

        .article-content {
            flex: 1;
            padding: 24px;
        }

        .article-title {
            font-size: 20px;
            font-weight: 700;
            line-height: 1.4;
            color: var(--color-text-dark);
            margin-bottom: 12px;
            cursor: pointer;
            transition: color 0.2s ease;
        }

        .article-title:hover {
            color: var(--color-primary);
        }

        .article-excerpt {
            font-size: 15px;
            line-height: 1.6;
            color: var(--color-text-light);
            margin-bottom: 16px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .article-meta {
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
            font-size: 13px;
            color: var(--color-text-light);
        }

        .badge {
            display: inline-flex;
            align-items: center;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }

        .badge-category {
            background: linear-gradient(135deg, rgba(37, 99, 235, 0.1), rgba(124, 58, 237, 0.1));
            color: var(--color-primary);
        }

        .badge-new {
            background: linear-gradient(135deg, #ff6b6b, #ff8787);
            color: white;
            animation: pulse 2s infinite;
        }

        .badge-source {
            background: #f3f4f6;
            color: var(--color-text-light);
        }

        [data-theme="dark"] .badge-source {
            background: #374151;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        /* Filter Bar */
        .filter-bar {
            background: white;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
            border: 1px solid #e5e7eb;
        }

        [data-theme="dark"] .filter-bar {
            background: #1f2937;
            border-color: #374151;
        }

        .filter-select {
            padding: 10px 16px;
            border-radius: 10px;
            border: 1px solid #e5e7eb;
            background: white;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .filter-select:hover {
            border-color: var(--color-primary);
        }

        .filter-select:focus {
            outline: none;
            border-color: var(--color-primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        [data-theme="dark"] .filter-select {
            background: #374151;
            border-color: #4b5563;
            color: #f9fafb;
        }

        /* Theme Toggle */
        .theme-toggle {
            position: fixed;
            bottom: 32px;
            right: 32px;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--color-primary), var(--color-secondary));
            color: white;
            border: none;
            box-shadow: 0 8px 24px rgba(37, 99, 235, 0.4);
            cursor: pointer;
            transition: all 0.3s ease;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .theme-toggle:hover {
            transform: scale(1.1) rotate(10deg);
            box-shadow: 0 12px 32px rgba(37, 99, 235, 0.5);
        }

        /* Loading & Empty States */
        .loader {
            width: 48px;
            height: 48px;
            border: 4px solid #e5e7eb;
            border-top: 4px solid var(--color-primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Highlight */
        mark {
            background: rgba(245, 158, 11, 0.3);
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: 500;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        [data-theme="dark"] ::-webkit-scrollbar-track {
            background: #1f2937;
        }

        [data-theme="dark"] ::-webkit-scrollbar-thumb {
            background: #4b5563;
        }

        /* Word Cloud */
        .word-cloud-container {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            border: 1px solid #e5e7eb;
        }

        [data-theme="dark"] .word-cloud-container {
            background: #1f2937;
            border-color: #374151;
        }

        .word-cloud {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 10px;
            line-height: 1.6;
            max-height: 100px;
            overflow: hidden;
        }

        .word-cloud-item {
            display: inline-block;
            padding: 6px 14px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
        }

        .word-cloud-item:hover {
            transform: scale(1.15);
            filter: brightness(1.1);
        }

        .word-cloud-item.size-xl {
            font-size: 24px;
            background: linear-gradient(135deg, rgba(37, 99, 235, 0.15), rgba(124, 58, 237, 0.15));
            color: var(--color-primary);
        }

        .word-cloud-item.size-lg {
            font-size: 20px;
            background: linear-gradient(135deg, rgba(245, 158, 11, 0.15), rgba(239, 68, 68, 0.15));
            color: #f59e0b;
        }

        .word-cloud-item.size-md {
            font-size: 17px;
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.15), rgba(6, 182, 212, 0.15));
            color: #10b981;
        }

        .word-cloud-item.size-sm {
            font-size: 14px;
            background: rgba(107, 114, 128, 0.1);
            color: var(--color-text-light);
        }

        [data-theme="dark"] .word-cloud-item {
            filter: brightness(1.2);
        }
    </style>
</head>
<body>

    <!-- Hero Section -->
    <section class="hero-section text-white py-12 md:py-16 relative z-10">
        <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="text-center">
                <h1 class="hero-title font-bold mb-4">
                    <span class="brand-name">AutoMatRadar</span> <span class="divider opacity-60">|</span> <span class="slogan">Material Tech, Day Day Up</span>
                </h1>
                <div class="mt-3 inline-flex items-center gap-2 text-sm opacity-80">
                    <span class="material-icons" style="font-size: 18px;">schedule</span>
                    <span>最后更新: <span id="lastUpdate">加载中...</span></span>
                </div>
            </div>
        </div>
    </section>

    <!-- Category Navigation -->
    <section class="sticky top-0 z-40 bg-white/80 backdrop-blur-md border-b border-gray-200 py-4" style="backdrop-filter: blur(12px);">
        <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
            <!-- Search Bar -->
            <div class="mb-4">
                <div class="relative max-w-xl mx-auto">
                    <span class="material-icons absolute left-4 top-1/2 transform -translate-y-1/2 text-gray-400">search</span>
                    <input type="text"
                           id="searchInput"
                           class="w-full pl-12 pr-12 py-3 border border-gray-300 rounded-full text-sm focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-200 transition-all"
                           placeholder="搜索技术资讯、材料创新..."
                           oninput="handleSearch()">
                    <button onclick="resetFilters()"
                            class="absolute right-3 top-1/2 transform -translate-y-1/2 p-1.5 text-gray-400 hover:text-gray-600 transition-colors"
                            title="重置搜索">
                        <span class="material-icons" style="font-size: 20px;">refresh</span>
                    </button>
                </div>
            </div>

            <div class="flex items-center justify-between gap-4 flex-wrap">
                <!-- Categories -->
                <div class="flex items-center gap-3 flex-wrap" id="categoryNav">
                    <!-- Dynamic -->
                </div>

                <!-- Filters -->
                <div class="flex items-center gap-3">
                    <select id="dateFilter" class="filter-select" onchange="handleFilter()">
                        <option value="all">所有时间</option>
                        <option value="today">今天</option>
                        <option value="week">最近7天</option>
                        <option value="month">最近30天</option>
                    </select>

                    <select id="sortOrder" class="filter-select" onchange="handleSort()">
                        <option value="newest">最新优先</option>
                        <option value="oldest">最早优先</option>
                    </select>
                </div>
            </div>

            <!-- Result Stats -->
            <div class="mt-3 text-sm text-gray-600">
                <span id="resultStats">显示全部文章</span>
            </div>
        </div>
    </section>

    <!-- Word Cloud Section -->
    <section class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <div class="word-cloud-container">
            <h2 class="text-xl font-bold text-center mb-4" style="color: var(--color-text-dark);">
                <span class="material-icons" style="vertical-align: middle; margin-right: 8px; font-size: 20px;">cloud</span>
                技术关键词
            </h2>
            <div id="wordCloud" class="word-cloud">
                <!-- Dynamic word cloud -->
            </div>
        </div>
    </section>

    <!-- Main Content -->
    <main class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <!-- Loading State -->
        <div id="loadingState" class="flex flex-col items-center justify-center py-20">
            <div class="loader"></div>
            <p class="mt-6 font-medium text-gray-600">正在加载资讯...</p>
        </div>

        <!-- Article List -->
        <div id="articleList" class="space-y-6 hidden">
            <!-- Dynamic -->
        </div>

        <!-- Empty State -->
        <div id="emptyState" class="text-center py-20 hidden">
            <span class="material-icons text-6xl text-gray-300">article</span>
            <p class="mt-4 text-lg text-gray-600">暂无相关资讯</p>
            <button onclick="resetFilters()"
                    class="mt-6 px-6 py-3 bg-blue-600 text-white rounded-full hover:bg-blue-700 transition-colors">
                重置筛选条件
            </button>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-white border-t border-gray-200 py-8 mt-12">
        <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 text-center">
            <p class="text-sm font-medium text-gray-700">AutoMatRadar | Material Tech, Day Day Up</p>
            <p class="text-xs mt-2 text-gray-500">数据来源于各网站官方 RSS 源 | 仅供个人学习研究使用</p>
        </div>
    </footer>

    <!-- Theme Toggle -->
    <button class="theme-toggle" onclick="toggleTheme()" title="切换主题">
        <span class="material-icons" id="themeIcon">dark_mode</span>
    </button>

    <script>
        // Global Variables
        let allArticles = [];
        let filteredArticles = [];
        let currentCategory = '全部';
        let categories = [];
        let searchKeyword = '';
        let dateFilter = 'all';
        let sortOrder = 'newest';

        // Initialize
        async function init() {
            console.log('🚀 初始化中...');
            initTheme();
            await loadData();
        }

        // Load Data
        async function loadData() {
            try {
                const timestamp = new Date().getTime();
                const response = await fetch(`data/news.json?t=${timestamp}`);

                if (!response.ok) throw new Error(`HTTP ${response.status}`);

                const data = await response.json();
                allArticles = data.articles || [];
                categories = data.categories || [];

                document.getElementById('lastUpdate').textContent = data.updateTime || '未知';

                generateCategoryNav();
                generateWordCloud();
                renderArticles();
                hideLoading();

                console.log(`✅ 加载成功: ${allArticles.length} 篇文章`);
            } catch (error) {
                console.error('❌ 加载失败:', error);
                showError();
            }
        }

        // Generate Category Navigation
        function generateCategoryNav() {
            const nav = document.getElementById('categoryNav');
            const allCategories = ['全部', ...categories];

            allCategories.forEach(category => {
                const pill = document.createElement('button');
                pill.className = `category-pill ${category === currentCategory ? 'active' : ''}`;
                pill.textContent = category;
                pill.onclick = () => switchCategory(category);
                nav.appendChild(pill);
            });
        }

        // Generate Word Cloud
        function generateWordCloud() {
            const wordCloudContainer = document.getElementById('wordCloud');
            wordCloudContainer.innerHTML = '';

            // 定义关键词类别（与金属、非金属、空气健康、腐蚀相关）
            const targetKeywords = {
                // 金属相关
                metal: ['aluminum', 'aluminium', 'steel', 'iron', 'copper', 'zinc', 'magnesium', 'titanium', 'alloy', 'metal', 'metallic', 'chrome', 'nickel', 'tin', 'lead'],
                // 非金属相关
                nonMetal: ['polymer', 'plastic', 'composite', 'carbon', 'fiber', 'fibre', 'resin', 'epoxy', 'polyurethane', 'nylon', 'rubber', 'silicone', 'ceramic', 'glass', 'graphene'],
                // 腐蚀相关
                corrosion: ['corrosion', 'rust', 'oxidation', 'coating', 'protection', 'anticorrosion', 'galvanization', 'electroplating', 'passivation', 'degradation', 'weathering'],
                // 空气健康相关
                health: ['voc', 'emission', 'formaldehyde', 'odor', 'smell', 'toxicity', 'indoor', 'air', 'quality', 'pollutant', 'volatile', 'benzene', 'safety', 'environmental', 'eco'],
                // 汽车材料工艺
                process: ['coating', 'paint', 'adhesive', 'welding', 'manufacturing', 'surface', 'treatment', 'finishing', 'recycling', 'sustainable', 'lightweight', 'durability']
            };

            // 展平所有关键词
            const allTargetKeywords = new Set();
            Object.values(targetKeywords).forEach(keywords => {
                keywords.forEach(kw => allTargetKeywords.add(kw.toLowerCase()));
            });

            // 统计关键词频率
            const wordFreq = {};

            allArticles.forEach(article => {
                const text = `${article.title} ${article.summary || article.description || ''}`.toLowerCase();
                const words = text.match(/\b[a-z]{3,}\b/g) || [];

                words.forEach(word => {
                    if (allTargetKeywords.has(word)) {
                        wordFreq[word] = (wordFreq[word] || 0) + 1;
                    }
                });
            });

            // 按频率排序，取前15个（适合两行显示）
            const sortedWords = Object.entries(wordFreq)
                .sort((a, b) => b[1] - a[1])
                .slice(0, 15);

            if (sortedWords.length === 0) {
                wordCloudContainer.innerHTML = '<p class="text-gray-500 text-center">暂无关键词数据</p>';
                return;
            }

            // 计算频率分位数，用于分配大小
            const frequencies = sortedWords.map(([, freq]) => freq);
            const maxFreq = Math.max(...frequencies);
            const minFreq = Math.min(...frequencies);

            // 生成词云元素
            sortedWords.forEach(([word, freq]) => {
                const span = document.createElement('span');

                // 根据频率分配大小
                const normalizedFreq = (freq - minFreq) / (maxFreq - minFreq || 1);
                let sizeClass;
                if (normalizedFreq > 0.7) {
                    sizeClass = 'size-xl';
                } else if (normalizedFreq > 0.4) {
                    sizeClass = 'size-lg';
                } else if (normalizedFreq > 0.2) {
                    sizeClass = 'size-md';
                } else {
                    sizeClass = 'size-sm';
                }

                span.className = `word-cloud-item ${sizeClass}`;
                span.textContent = word;
                span.title = `${word} (${freq}次)`;
                span.onclick = () => {
                    document.getElementById('searchInput').value = word;
                    handleSearch();
                    // 滚动到文章列表
                    document.getElementById('articleList').scrollIntoView({ behavior: 'smooth' });
                };

                wordCloudContainer.appendChild(span);
            });
        }

        // Switch Category
        function switchCategory(category) {
            currentCategory = category;

            const pills = document.querySelectorAll('.category-pill');
            pills.forEach(pill => {
                if (pill.textContent === category) {
                    pill.classList.add('active');
                } else {
                    pill.classList.remove('active');
                }
            });

            renderArticles();
        }

        // Render Articles
        function renderArticles() {
            const container = document.getElementById('articleList');
            const emptyState = document.getElementById('emptyState');
            container.innerHTML = '';

            // Apply filters
            let filtered = currentCategory === '全部'
                ? allArticles
                : allArticles.filter(a => a.category === currentCategory);

            // Search filter
            if (searchKeyword) {
                const keyword = searchKeyword.toLowerCase();
                filtered = filtered.filter(a => {
                    const title = (a.title || '').toLowerCase();
                    const summary = (a.summary || a.description || '').toLowerCase();
                    return title.includes(keyword) || summary.includes(keyword);
                });
            }

            // Date filter
            if (dateFilter !== 'all') {
                const now = new Date();
                const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());

                filtered = filtered.filter(a => {
                    const articleDate = new Date(a.date);
                    const daysDiff = Math.floor((now - articleDate) / (1000 * 60 * 60 * 24));

                    if (dateFilter === 'today') return articleDate >= today;
                    if (dateFilter === 'week') return daysDiff <= 7;
                    if (dateFilter === 'month') return daysDiff <= 30;
                    return true;
                });
            }

            // Sort
            filtered.sort((a, b) => {
                const dateA = new Date(a.date);
                const dateB = new Date(b.date);
                return sortOrder === 'newest' ? dateB - dateA : dateA - dateB;
            });

            filteredArticles = filtered;
            updateResultStats();

            if (filtered.length === 0) {
                container.classList.add('hidden');
                emptyState.classList.remove('hidden');
                return;
            }

            emptyState.classList.add('hidden');
            container.classList.remove('hidden');

            filtered.forEach(article => {
                const card = createArticleCard(article);
                container.appendChild(card);
            });
        }

        // Create Article Card
        function createArticleCard(article) {
            const card = document.createElement('div');
            card.className = 'article-card';

            const date = new Date(article.date);
            const dateStr = date.toLocaleDateString('zh-CN', {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit'
            });

            // Check if new (24 hours)
            const now = new Date();
            const hoursDiff = (now - date) / (1000 * 60 * 60);
            const isNew = hoursDiff <= 24;

            // Extract source
            const source = article.source || extractSourceFromLink(article.link);

            // Highlight keywords
            const title = highlightKeyword(article.title);
            const summary = highlightKeyword(article.summary || article.description);

            card.innerHTML = `
                <div class="article-accent"></div>
                <div class="article-content">
                    <div class="article-meta mb-3">
                        <span class="flex items-center gap-1">
                            <span class="material-icons" style="font-size: 16px;">event</span>
                            ${dateStr}
                        </span>
                        ${isNew ? '<span class="badge badge-new">NEW</span>' : ''}
                        <span class="badge badge-category">${escapeHtml(article.category)}</span>
                        ${source ? `<span class="badge badge-source">
                            <span class="material-icons" style="font-size: 12px; margin-right: 4px;">rss_feed</span>
                            ${escapeHtml(source)}
                        </span>` : ''}
                    </div>

                    <h2 class="article-title" onclick="window.open('${escapeHtml(article.link)}', '_blank')">
                        ${title}
                    </h2>

                    <p class="article-excerpt">
                        ${summary}
                    </p>

                    <div class="flex items-center gap-4">
                        <button onclick="window.open('${escapeHtml(article.link)}', '_blank')"
                                class="text-blue-600 hover:text-blue-700 font-medium text-sm flex items-center gap-1 transition-colors">
                            阅读全文
                            <span class="material-icons" style="font-size: 16px;">arrow_forward</span>
                        </button>
                        <button onclick="shareArticle('${escapeHtml(article.link)}', '${escapeHtml(article.title)}')"
                                class="text-gray-600 hover:text-gray-700 font-medium text-sm flex items-center gap-1 transition-colors">
                            <span class="material-icons" style="font-size: 16px;">share</span>
                            分享
                        </button>
                    </div>
                </div>
            `;

            return card;
        }

        // Extract Source from Link
        function extractSourceFromLink(link) {
            try {
                const url = new URL(link);
                const hostname = url.hostname.replace('www.', '');
                return hostname.split('.')[0];
            } catch {
                return '';
            }
        }

        // Highlight Keyword
        function highlightKeyword(text) {
            if (!searchKeyword || !text) return escapeHtml(text);

            const escapedText = escapeHtml(text);
            const regex = new RegExp(`(${searchKeyword})`, 'gi');
            return escapedText.replace(regex, '<mark>$1</mark>');
        }

        // Share Article
        function shareArticle(url, title) {
            if (navigator.share) {
                navigator.share({ title, url });
            } else {
                navigator.clipboard.writeText(url);
                alert('链接已复制到剪贴板！');
            }
        }

        // HTML Escape
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text || '';
            return div.innerHTML;
        }

        // Search Handler
        function handleSearch() {
            searchKeyword = document.getElementById('searchInput').value.trim();
            renderArticles();
        }

        // Filter Handler
        function handleFilter() {
            dateFilter = document.getElementById('dateFilter').value;
            renderArticles();
        }

        // Sort Handler
        function handleSort() {
            sortOrder = document.getElementById('sortOrder').value;
            renderArticles();
        }

        // Reset Filters
        function resetFilters() {
            document.getElementById('searchInput').value = '';
            document.getElementById('dateFilter').value = 'all';
            document.getElementById('sortOrder').value = 'newest';
            searchKeyword = '';
            dateFilter = 'all';
            sortOrder = 'newest';
            currentCategory = '全部';

            const pills = document.querySelectorAll('.category-pill');
            pills.forEach(pill => {
                if (pill.textContent === '全部') {
                    pill.classList.add('active');
                } else {
                    pill.classList.remove('active');
                }
            });

            renderArticles();
        }

        // Update Result Stats
        function updateResultStats() {
            const stats = document.getElementById('resultStats');
            if (searchKeyword || dateFilter !== 'all' || currentCategory !== '全部') {
                stats.textContent = `找到 ${filteredArticles.length} 篇文章`;
            } else {
                stats.textContent = `显示全部 ${allArticles.length} 篇文章`;
            }
        }

        // Hide Loading
        function hideLoading() {
            document.getElementById('loadingState').classList.add('hidden');
            document.getElementById('articleList').classList.remove('hidden');
        }

        // Show Error
        function showError() {
            const loadingState = document.getElementById('loadingState');
            loadingState.innerHTML = `
                <span class="material-icons text-6xl text-gray-300">error_outline</span>
                <p class="mt-4 text-lg text-gray-600">加载失败</p>
                <button onclick="location.reload()"
                        class="mt-4 px-6 py-3 bg-blue-600 text-white rounded-full hover:bg-blue-700 transition-colors">
                    重新加载
                </button>
            `;
        }

        // Theme Functions
        function initTheme() {
            const savedTheme = localStorage.getItem('theme') || 'light';
            if (savedTheme === 'dark') {
                document.documentElement.setAttribute('data-theme', 'dark');
                document.getElementById('themeIcon').textContent = 'light_mode';
            }
        }

        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';

            document.documentElement.setAttribute('data-theme', newTheme);
            document.getElementById('themeIcon').textContent = newTheme === 'dark' ? 'light_mode' : 'dark_mode';
            localStorage.setItem('theme', newTheme);
        }

        // Page Load
        window.addEventListener('DOMContentLoaded', init);
    </script>

</body>
</html>
