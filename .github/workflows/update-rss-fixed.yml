name: 更新汽车材料RSS资讯（备用）

on:
  # 禁用定时任务，避免与主工作流冲突
  # schedule:
  #   - cron: '50 0 * * *'
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  fetch-rss:
    runs-on: ubuntu-latest

    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 安装依赖
        run: |
          cd scripts
          npm install

      - name: 抓取 RSS 并生成摘要
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DOUBAO_API_KEY: ${{ secrets.DOUBAO_API_KEY }}
          AI_PROVIDER: deepseek
        run: |
          cd scripts
          node fetch-rss.js

      - name: 提交并推送数据文件
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/news.json

          # 检查是否有变化
          if git diff --quiet && git diff --staged --quiet; then
            echo "没有变化，跳过提交"
            exit 0
          fi

          # 提交变化
          git commit -m "🤖 自动更新RSS数据 - $(date +'%Y-%m-%d %H:%M:%S')"

          # 尝试推送，如果失败则先拉取再推送
          if ! git push; then
            echo "推送失败，尝试同步远程更改..."
            git pull --rebase origin main
            git push
          fi

